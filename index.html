<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightchain AI | RTSecure Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0d1117;
            --bg-sidebar: #010409;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --accent-green: #3fb950;
            --accent-blue: #58a6ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            overflow: hidden;
        }

        .layout {
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 240px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .logo {
            padding: 0 20px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            letter-spacing: 1px;
        }

        .nav-section {
            font-size: 0.7rem;
            color: #8b949e;
            padding: 15px 20px 5px;
            text-transform: uppercase;
        }

        .nav-item {
            padding: 10px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .nav-item:hover {
            background: #161b22;
            color: var(--accent-blue);
        }

        .nav-item.active {
            border-left: 3px solid var(--accent-green);
            background: #161b22;
        }

        /* Main Content & Top Bar */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            background: var(--bg-main);
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
        }

        .stat-online { color: var(--accent-green); }

        /* Audit Interface Area */
        .content {
            padding: 30px;
            overflow-y: auto;
        }

        .audit-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 25px;
            max-width: 800px;
        }

        h2 { margin-top: 0; font-size: 1.2rem; }

        input, select {
            background: #010409;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-family: inherit;
            margin-right: 10px;
            width: 300px;
        }

        button {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Terminal Style Logs */
        .terminal {
            margin-top: 30px;
            background: #000;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #8b949e;
        }

        .log-entry { margin-bottom: 8px; }
        .green { color: var(--accent-green); }
    </style>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="logo">LIGHTCHAIN AI</div>
        
        <div class="nav-section">AIVM Infrastructure</div>
        <div class="nav-item">Dashboard</div>
        <div class="nav-item active">RTSecure Audit</div>
    </aside>

    <div class="main-container">
        <header class="top-bar">
            <div class="stats">
                <span>NETWORK: <span class="stat-online">● ONLINE</span></span>
                <span></span>
                <span>ETH: $2,355.81</span>
                <span>LCAI: $0.005086</span>
            </div>
            <div style="font-size: 0.8rem;">[ ]</div>
        </header>

        <main class="content">
            <div class="audit-card">
                <h2>Request Security Audit</h2>
                <div style="display: flex; gap: 10px;">
                    <input type="text" placeholder="Contract Address (0x...)">
                    <select>
                        <option>One-Time Scan (100 LCAI)</option>
                        <option>Monthly Subscription (500 LCAI)</option>
                    </select>
                    <button>INITIATE SECURE SCAN</button>
                </div>

                <div class="terminal">
                    <div class="log-entry"><span class="green">[SYS]</span> Initializing RTSecure AI Engine...</div>
                    <div class="log-entry"><strong>Stage 1: Static Analysis</strong></div>
                    <div class="log-entry"> > Awaiting contract address...</div>
                    <br>
                    <div class="log-entry"><strong>Stage 2: AI Semantic Audit</strong></div>
                    <div class="log-entry"> > Standing by for AIVM...</div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<script>
    const RTS_CONFIG = {
        LCA_TOKEN: "0x9ca8530ca349c966fe9ef903df17a75b8a778927",
        SECURITY_ORACLE: "0x78B74C7DcA169eA824589A45b52b15D11da6D039",
        RPC: "https://light-testnet-rpc.lightchain.ai",
        FEES: {
            STATIC: ethers.parseEther("100"), 
            REDTEAM: ethers.parseEther("500")
        }
    };

    let activeSigner = null;

    // --- Main Audit Pipeline ---
    async function startAuditProtocol() {
        const targetAddress = document.querySelector('input').value;
        const scanType = document.querySelector('select').selectedIndex; // 0=Static, 1=RedTeam

        if (!ethers.isAddress(targetAddress)) {
            return log("<span style='color:var(--accent-blue)'>[ERR]</span> Please provide a valid 0x address.");
        }

        if (!activeSigner) await connectWallet();

        try {
            // Stage 1: Always runs as a prerequisite
            await executeStaticAnalysis(targetAddress);

            // Stage 2: Triggered if "Red Team" or "Monthly" is selected
            if (scanType === 1) {
                await executeDeFiRedTeamScan(targetAddress);
            }

            log("<br><span class='green'>[COMPLETE]</span> Full Security Protocol Finalized.");
        } catch (err) {
            log(`<span style='color:#ff4444'>[FATAL]</span> Protocol Aborted: ${err.message}`);
        }
    }

    // --- DeFi Focused Red Team Scan ---
    async function executeDeFiRedTeamScan(address) {
        log("<br><strong>Stage 2: Initiating Deep DeFi Red Team Audit</strong>");
        log("> Synchronizing with AIVM Neural-Llama-3-70B...");

        try {
            const response = await fetch("https://chat2.lightchain.ai/api/v1/chat/completions", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${await activeSigner.getAddress()}`
                },
                body: JSON.stringify({
                    model: "Neural-Llama-3-70B",
                    messages: [
                        { 
                            role: "system", 
                            content: "You are an Elite DeFi Security Researcher. Perform a Red Team exploit analysis. Focus on: 1. Flash loan logical flows 2. Price Oracle manipulation 3. Sandwich attack vectors 4. State-transition reentrancy 5. Fee-on-transfer logic errors. Provide a RISK RATING for each finding." 
                        },
                        { role: "user", content: `Audit the DeFi logic for contract: ${address}. Identify any economic or logical vulnerabilities.` }
                    ],
                    temperature: 0.1
                })
            });

            const data = await response.json();
            const report = data.choices[0].message.content;

            log("<div style='background:rgba(255,255,255,0.05); padding:10px; border-left: 2px solid var(--accent-blue); margin: 10px 0;'>" + report.replace(/\n/g, "<br>") + "</div>");
        } catch (e) {
            throw new Error("AIVM Deep Scan Gateway Timeout.");
        }
    }

    // --- Core Utilities ---
    async function executeStaticAnalysis(address) {
        log("<strong>Stage 1: Running Quick Static Scan</strong>");
        const logs = [
            `> Analyzing ${address.slice(0,10)}...`,
            "> Checking Slither detector: reentrancy-eth",
            "> Checking Slither detector: uninitialized-state",
            "> [INFO] Syntax and Visibility Check: 100% Pass."
        ];
        for (const line of logs) {
            await new Promise(r => setTimeout(r, 500));
            log(line);
        }
    }

    async function connectWallet() {
        if (!window.ethereum) throw new Error("MetaMask not found.");
        const provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        activeSigner = await provider.getSigner();
        log(`[AUTH] Secure Link Established: ${accounts[0].slice(0,6)}...`);
    }

    function log(msg) {
        const terminal = document.querySelector('.terminal');
        terminal.innerHTML += `<div class='log-entry'>${msg}</div>`;
        terminal.scrollTop = terminal.scrollHeight;
    }

    // Bind to UI Button
    document.querySelector('button').onclick = startAuditProtocol;
</script>
</body>
</html>
